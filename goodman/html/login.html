	<script>
		// INV-22180 - Add splunk monitoring to eIC for PCI 4.0 - Tamper Prevention and Monitoring - Part II
		// If any event in the frontend, is blocked by the Conent-Security-Policy immiedately log the event to Splunk for review.
		window.addEventListener('securitypolicyviolation', async function (evt) {		
			// Details can be found here:
			// https://developer.mozilla.org/en-US/docs/Web/API/SecurityPolicyViolationEvent
			var cspViolationData = { 
				"site": window.location.hostname,
				"documentUri": evt.documentURI,
				"disposition": evt.disposition,
				"referrer": evt.referrer,
				"violatedDirective": evt.violatedDirective,
				"effectiveDirective": evt.effectiveDirective,
				"originalPolicy": evt.originalPolicy,
				"blockedUri": evt.blockedURI,
				"sourceFile": evt.sourceFile,
				"lineNumber": evt.lineNumber,
				"columnNumber": evt.columnNumber,
				"sample": evt.sample
			};
			
			console.log('logging csp violation to billtrust splunk "bt_frontend_security"', cspViolationData);
			
			await fetch('https://http-inputs-billtrust.splunkcloud.com/services/collector/event', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Authorization': 'Splunk 200e4549-d35a-4625-89b9-ca4f67cbf5c0' // Don't panic. This follows Splunk's best practice for javascript/browser driven logging.
				},
				body: JSON.stringify({
					index: 'bt_frontend_security',
					event: cspViolationData
				})
			});				
		});
		</script>

                Opera: function() {

                Windows: function() {
                    return navigator.userAgent.match(/IEMobile/i);
